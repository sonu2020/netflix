<!doctype html>
<html>
  <head>
    <title>Sign in Page</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(the_netflix_login_background__canada__2024___by_logofeveryt_dh0w8qv-pre.jpg);
      }
      .login-box {
        background: black;
        box-shadow: 20px 30px 40px;
        margin-top: 320px;
        text-align: center;
        padding: 20px;
        border-radius: 10px;
        width: 320px;
        height: 285px;
      }
      input {
        width: 100%;
        background-color: rgb(221, 221, 221);
        padding: 8px 40px 12px 15px;
        border-radius: 20px;
        margin: 8px 0;
        box-sizing: border-box;
        border: 0.5px solid;
      }
      button {
        padding: 10px;
        margin-top: 10px;
        width: 80px;
        background-color: rgb(255, 255, 255);
        height: 40px;
        cursor: pointer;
        border: 1px solid;
        border-radius: 10px;
      }
      .buttons {
        display: flex;
        font-size: bold;
        justify-content: space-between;
      }
      .title {
        font-family: "Netflix Font", sans-serif;
        font-size: 26px;
        color: rgb(210, 0, 0);
      }
      .text {
        font-size: 12px;
        color: white;
        font-family: "Times New Roman", Times, serif;
        margin-top: 20px;
      }
      .button:active {
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2 class="title">Log In</h2>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <!-- <div class="remember-forgot">
        <label><input type="checkbox" />Remember Me</label>
        <a href="#">Forgot password</a>
      </div> -->
      <div class="register-link">
        <h3 class="text">Don't have an account? <a href="#">Register</a></h3>
      </div>
      <div class="buttons">
        <button type="button" onclick="login()">Login</button>
        <button onclick="exitForm()">Exit</button>
      </div>
    </div>
    <script>
      function login() {
        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();
        if (username === "" || password === "") {
          alert("Please enter Username and Password!");
          return;
        }
        window.location.href = "home.html";
      }
      function exitForm() {
        let confirmExit = confirm("Are you sure you want to exit?");
        if (confirmExit) {
          window.close();
        }
      }
    </script>
  </body>
</html>
